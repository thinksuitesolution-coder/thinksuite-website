  <title>Job Applications — ThinkSuite Admin</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236C63FF'/><text y='.9em' font-size='70' x='15' fill='white' font-weight='900'>T</text></svg>">
  <link rel="stylesheet" href="css/admin.css">
  <style>
    .app-row td { vertical-align:top; }
    .app-cover { font-size:.8125rem; color:var(--gray-500); max-width:260px; line-height:1.4; margin-top:3px; }
    .filter-bar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:16px; }
    .filter-btn { padding:6px 14px; border-radius:999px; font-size:.8125rem; font-weight:600; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); color:var(--gray-400); cursor:pointer; transition:all .15s; }
    .filter-btn.active { background:rgba(108,99,255,.15); border-color:rgba(108,99,255,.4); color:var(--purple-400); }
    .unread-dot { display:inline-block; width:7px; height:7px; background:var(--purple-400); border-radius:50%; margin-right:6px; }
    .app-status-select { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); border-radius:6px; color:var(--gray-300); font-size:.8125rem; padding:4px 8px; cursor:pointer; }
  </style>
</head>
<body>

      <div class="nav-section-label" style="margin-top:16px">Content</div>

    <div class="sidebar-footer">
      <div class="admin-user"><div class="admin-avatar" id="sidebar-avatar">A</div><div><div class="admin-name" id="sidebar-name">Admin</div><div class="admin-role" id="sidebar-role">Super Admin</div></div></div>
      <button id="logout-btn" class="sidebar-link" style="width:100%;margin-top:8px;color:var(--red-500)"><svg class="sidebar-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"/></svg>Sign Out</button>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <span class="topbar-title">Job Applications</span>
      <div class="topbar-actions">
        <input id="app-search" type="text" placeholder="Search applicant…" class="topbar-search" style="padding:8px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:var(--gray-200);font-size:.875rem;width:200px">
        <a href="careers-admin.html" class="topbar-btn topbar-btn-ghost">Manage Jobs</a>
      </div>
    </div>

    <div class="admin-body">
      <div id="alert-container"></div>

      <div class="filter-bar">
        <button class="filter-btn active" data-status="">All</button>
        <button class="filter-btn" data-status="new">New</button>
        <button class="filter-btn" data-status="screening">Screening</button>
        <button class="filter-btn" data-status="interview">Interview</button>
        <button class="filter-btn" data-status="offered">Offered</button>
        <button class="filter-btn" data-status="rejected">Rejected</button>
      </div>

      <div class="table-card">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Applicant</th>
              <th>Applied For</th>
              <th>Portfolio</th>
              <th>Status</th>
              <th>Applied On</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="apps-tbody">
            <tr><td colspan="6" style="text-align:center;color:var(--gray-500);padding:40px">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="js/admin.js"></script>
<script>ThinkAdmin.initApplicationsList();</script>
</body>
</html>
