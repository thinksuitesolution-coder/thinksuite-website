<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ThinkSuite Admin</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236C63FF'/><text y='.9em' font-size='70' x='15' fill='white' font-weight='900'>T</text></svg>">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="sidebar-logo-mark">T</div>
      ThinkSuite
    </div>
    <div class="login-title">Welcome back</div>
    <div class="login-sub">Sign in to your admin panel</div>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input id="email" type="email" class="form-input" placeholder="admin@thinksuite.in" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input id="password" type="password" class="form-input" placeholder="Enter password" required autocomplete="current-password">
      </div>
      <button id="login-btn" type="submit" class="login-btn">Sign In</button>
      <div id="login-error" class="login-error"></div>
    </form>
  </div>
</div>
<script src="js/admin.js"></script>
<script>ThinkAdmin.initLogin();</script>
</body>
</html>
