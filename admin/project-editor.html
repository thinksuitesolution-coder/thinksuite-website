  <main class="admin-main">
    <div class="admin-topbar">
      <span class="topbar-title" id="page-title">New Project</span>
      <div class="topbar-actions">
        <a href="projects.html" class="topbar-btn topbar-btn-ghost">Back to Projects</a>
      </div>
    </div>
    <div class="admin-body">
      <div id="alert-container"></div>
      <form id="project-form">
        <div class="editor-layout">
          <div>
            <div class="form-card" style="margin-bottom:16px">
              <div class="form-card-title">Project Details</div>
              <div class="form-group">
                <label class="form-label">Title *</label>
                <input id="title" type="text" class="form-input" placeholder="Project name" required>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Client</label>
                  <input id="client" type="text" class="form-input" placeholder="Client name">
                </div>
                <div class="form-group">
                  <label class="form-label">Category</label>
                  <input id="category" type="text" class="form-input" placeholder="e.g. Branding, Web Dev…">
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Excerpt</label>
                <textarea id="excerpt" class="form-textarea" rows="2" placeholder="Short project summary…"></textarea>
              </div>
              <div class="form-group">
                <label class="form-label">Full Description</label>
                <textarea id="description" class="form-textarea" rows="8" placeholder="Detailed project description, process, results…" style="resize:vertical"></textarea>
              </div>
            </div>
          </div>
          <div>
            <div class="form-card" style="margin-bottom:16px">
              <div class="form-card-title">Settings</div>
              <div class="form-group">
                <label class="form-label">Status</label>
                <select id="status" class="form-select">
                  <option value="published">Published</option>
                  <option value="draft">Draft</option>
                </select>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Year</label>
                  <input id="year" type="number" class="form-input" placeholder="2024" min="2000" max="2099">
                </div>
                <div class="form-group">
                  <label class="form-label">Sort Order</label>
                  <input id="sort_order" type="number" class="form-input" value="0">
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Project URL</label>
                <input id="url" type="url" class="form-input" placeholder="https://…">
              </div>
              <div class="form-group">
                <label class="form-label">Tags (comma separated)</label>
                <input id="tags" type="text" class="form-input" placeholder="branding, logo, identity…">
              </div>
              <label class="form-check">
                <input id="featured" type="checkbox">
                Feature this project
              </label>
            </div>
            <div class="form-card">
              <div class="form-card-title">Cover Image</div>
              <div class="form-group">
                <label class="form-label">Image URL</label>
                <input id="cover_image" type="url" class="form-input" placeholder="https://…">
                <img id="img-preview" class="img-preview" alt="Preview">
              </div>
              <button type="submit" class="topbar-btn topbar-btn-primary" style="width:100%;justify-content:center;padding:11px">Save Project</button>
            </div>
          </div>
        </div>
      </form>
    </div>
  </main>

<script>ThinkAdmin.initProjectEditor();</script>

</html>
