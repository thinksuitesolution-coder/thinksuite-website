<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg_market-research" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050d1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyan_glow_market-research" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0087cc;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="line_grad_market-research" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0" />
    </linearGradient>
    <filter id="glow_market-research">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft_glow_market-research">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip_market-research">
      <rect width="1200" height="400"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg_market-research)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" clip-path="url(#clip_market-research)">
    <line x1="0" y1="0" x2="0" y2="400" stroke="#00d4ff" stroke-width="1"/><line x1="60" y1="0" x2="60" y2="400" stroke="#00d4ff" stroke-width="1"/><line x1="120" y1="0" x2="120" y2="400" stroke="#00d4ff" stroke-width="1"/><line x1="180" y1="0" x2="180" y2="400" stroke="#00d4ff" stroke-width="1"/><line x1="240" y1="0" x2="240" y2="400" stroke="#00d4ff" stroke-width="1"/><line x1="300" y1="0" x2="300" y2="400" stroke="#00d4ff" stroke-width="1"/><line x1="360" y1="0" x2="360" y2="400" stroke="#00d4ff" stroke-width="1"/><line x1="420" y1="0" x2="420" y2="400" stroke="#00d4ff" stroke-width="1"/><line x1="480" y1="0" x2="480" y2="400" stroke="#00d4ff" stroke-width="1"/><line x1="540" y1="0" x2="540" y2="400" stroke="#00d4ff" stroke-width="1"/><line x1="600" y1="0" x2="600" y2="400" stroke="#00d4ff" stroke-width="1"/><line x1="660" y1="0" x2="660" y2="400" stroke="#00d4ff" stroke-width="1"/><line x1="720" y1="0" x2="720" y2="400" stroke="#00d4ff" stroke-width="1"/><line x1="780" y1="0" x2="780" y2="400" stroke="#00d4ff" stroke-width="1"/><line x1="840" y1="0" x2="840" y2="400" stroke="#00d4ff" stroke-width="1"/><line x1="900" y1="0" x2="900" y2="400" stroke="#00d4ff" stroke-width="1"/><line x1="960" y1="0" x2="960" y2="400" stroke="#00d4ff" stroke-width="1"/><line x1="1020" y1="0" x2="1020" y2="400" stroke="#00d4ff" stroke-width="1"/><line x1="1080" y1="0" x2="1080" y2="400" stroke="#00d4ff" stroke-width="1"/><line x1="1140" y1="0" x2="1140" y2="400" stroke="#00d4ff" stroke-width="1"/><line x1="1200" y1="0" x2="1200" y2="400" stroke="#00d4ff" stroke-width="1"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#00d4ff" stroke-width="1"/><line x1="0" y1="60" x2="1200" y2="60" stroke="#00d4ff" stroke-width="1"/><line x1="0" y1="120" x2="1200" y2="120" stroke="#00d4ff" stroke-width="1"/><line x1="0" y1="180" x2="1200" y2="180" stroke="#00d4ff" stroke-width="1"/><line x1="0" y1="240" x2="1200" y2="240" stroke="#00d4ff" stroke-width="1"/><line x1="0" y1="300" x2="1200" y2="300" stroke="#00d4ff" stroke-width="1"/><line x1="0" y1="360" x2="1200" y2="360" stroke="#00d4ff" stroke-width="1"/>
  </g>

  <!-- Cyan blob glow left -->
  <ellipse cx="100" cy="200" rx="250" ry="180" fill="url(#cyan_glow_market-research)" opacity="0.6"/>

  <!-- Right decorative area -->
  <rect x="820" y="0" width="380" height="400" fill="#00d4ff" opacity="0.03"/>

  <!-- Decorative circles right -->
  <circle cx="1050" cy="200" r="160" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.08"/>
  <circle cx="1050" cy="200" r="120" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.08"/>
  <circle cx="1050" cy="200" r="80" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.12"/>
  <circle cx="1050" cy="200" r="40" fill="rgba(0,212,255,0.08)" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>

  <!-- Icon in circle -->
  <circle cx="1050" cy="200" r="36" fill="rgba(0,212,255,0.15)" filter="url(#glow_market-research)"/>
  <g transform="translate(1026, 176) scale(2)" fill="#00d4ff" opacity="0.9">
    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
  </g>

  <!-- Floating dots -->
  <circle cx="900" cy="80" r="3" fill="#00d4ff" opacity="0.4"/>
  <circle cx="960" cy="140" r="2" fill="#00d4ff" opacity="0.3"/>
  <circle cx="1120" cy="300" r="3" fill="#00d4ff" opacity="0.3"/>
  <circle cx="1150" cy="100" r="2" fill="#00d4ff" opacity="0.4"/>
  <circle cx="850" cy="320" r="4" fill="#00d4ff" opacity="0.2"/>

  <!-- Vertical separator line -->
  <line x1="800" y1="40" x2="800" y2="360" stroke="#00d4ff" stroke-width="1" opacity="0.1"/>

  <!-- Top cyan accent line -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#line_grad_market-research)"/>

  <!-- Left content -->
  <!-- Label tag -->
  <rect x="80" y="120" width="144" height="28" rx="6" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="1" opacity="0.8"/>
  <text x="92" y="139" font-family="Outfit, sans-serif" font-weight="500" font-size="12" fill="#00d4ff" letter-spacing="1.5">MARKET RESEARCH</text>

  <!-- Title -->
  <text x="80" y="195" font-family="Outfit, sans-serif" font-weight="700" font-size="32" fill="white" letter-spacing="-0.5">Data-Driven Insights for Smarter Business</text>
<text x="80" y="233" font-family="Outfit, sans-serif" font-weight="700" font-size="32" fill="white" letter-spacing="-0.5">Decisions</text>


  <!-- Bottom accent line -->
  <rect x="80" y="283" width="60" height="3" rx="1.5" fill="#00d4ff"/>

  <!-- ThinkSuite watermark -->
  <text x="80" y="368" font-family="Outfit, sans-serif" font-weight="600" font-size="13" fill="rgba(255,255,255,0.2)" letter-spacing="0.5">Think<tspan fill="rgba(0,212,255,0.4)">Suite</tspan></text>
  <text x="1120" y="368" font-family="Outfit, sans-serif" font-weight="400" font-size="12" fill="rgba(255,255,255,0.15)" text-anchor="end">thinksuite.in</text>
</svg>